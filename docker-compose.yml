services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    # Bind-mounted so Alembic migrations generated/edited on the host are usable
    # from inside the container (and vice versa) without rebuilding the image.
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Local dev: http://localhost:8080. For a real VPS deploy, change to
      # "80:80" and "443:443" and point the Caddyfile at your real domain.
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres_data:
